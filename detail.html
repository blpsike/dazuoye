<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商品详情</title>
    <link rel="stylesheet" href="css/index.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo">商城</div>
            <ul class="nav-menu">
                <li><a href="index.html">首页</a></li>
                <li><a href="cart.html">购物车</a></li>
                <li><a href="#">我的账户</a></li>
            </ul>
        </nav>
    </header>

    <main class="product-detail-container">
        <div class="product-images">
            <div class="main-image">
                <img id="main-product-image" src="" alt="商品主图">
            </div>
            <div class="thumbnail-images">
                <!-- 缩略图将通过JavaScript动态加载 -->
            </div>
        </div>

        <div class="product-info">
            <h1 id="product-title">商品标题</h1>
            <div class="product-meta">
                <span class="rating">评分: <span id="product-rating">0</span>/5</span>
                <span class="sold">已售: <span id="product-sold">0</span>件</span>
            </div>
            <div class="price-section">
                <span class="current-price">¥<span id="product-price">0.00</span></span>
                <span class="original-price">¥<span id="product-original-price">0.00</span></span>
            </div>
            
            <div class="product-description">
                <h3>商品描述</h3>
                <p id="product-description-text">商品详细描述</p>
            </div>

            <div class="purchase-options">
                <div class="quantity-selector">
                    <label>数量:</label>
                    <button class="quantity-btn" id="decrease-qty">-</button>
                    <input type="number" id="quantity" min="1" value="1">
                    <button class="quantity-btn" id="increase-qty">+</button>
                </div>
                
                <button id="add-to-cart" class="btn btn-primary">加入购物车</button>
                <button id="buy-now" class="btn btn-secondary">立即购买</button>
            </div>
        </div>
    </main>

    <script src="js/main.js"></script>
</body>
</html>
