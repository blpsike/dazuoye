<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <!-- 字符编码：UTF-8 -->
    <meta charset="UTF-8">
    <!-- 视口设置：移动端适配 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 页面标题 -->
    <title>我尚在建设中</title>
    <!-- ===== 内联样式表 ===== -->
    <style>
        /* 通配符重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        /* 页面主体：居中显示，浅色背景 */
        body {
            background: #f0f2f5;
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        /* 消息卡片容器：白色背景，大圆角，阴影 */
        .message-card {
            background: #fff;
            border-radius: 32px;
            padding: 48px 32px;
            text-align: center;
            box-shadow: 0 20px 35px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 90%;
        }
        /* 图标：大号表情符号 */
        .icon {
            font-size: 80px;
            margin-bottom: 20px;
        }
        /* 主标题：蓝色 */
        h1 {
            font-size: 28px;
            color: #1677ff;
            margin-bottom: 12px;
        }
        /* 描述文字 */
        p {
            color: #666;
            font-size: 16px;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        /* 返回首页按钮 */
        .back-btn {
            display: inline-block;
            background: #1677ff;
            color: white;
            text-decoration: none;
            padding: 12px 28px;
            border-radius: 40px;
            font-size: 16px;
            transition: 0.3s;
        }
        .back-btn:hover {
            background: #0c5fcc;
            transform: translateY(-2px);  /* 悬停上浮 */
        }
        /* 底部链接区域 */
        .links {
            margin-top: 30px;
            font-size: 14px;
        }
        .links a {
            color: #1677ff;
            text-decoration: none;
            margin: 0 10px;
        }
        .links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="message-card">
        <!-- 施工图标 -->
        <div class="icon">🚧</div>
        <!-- 标题 -->
        <h1>功能正在建设中</h1>
        <!-- 说明文字 -->
        <p>您点击的链接对应的功能尚未开放。<br>敬请期待后续更新！</p>
        <!-- 返回首页按钮 -->
        <a href="index.html" class="back-btn">← 返回首页</a>
        <!-- 底部导航链接 -->
        <div class="links">
            <a href="index.html">首页</a> |
            <a href="cart.html">购物车</a> |
            <a href="login.html">登录</a>
        </div>
    </div>
</body>
</html>
