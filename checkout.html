<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>结算</title>
    <link rel="stylesheet" href="css/index.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo">商城</div>
            <ul class="nav-menu">
                <li><a href="index.html">首页</a></li>
                <li><a href="cart.html">购物车</a></li>
                <li><a href="#">我的账户</a></li>
            </ul>
        </nav>
    </header>

    <main class="checkout-container">
        <h1>订单结算</h1>
        
        <div class="checkout-steps">
            <div class="step active">1. 收货地址</div>
            <div class="step">2. 支付方式</div>
            <div class="step">3. 订单确认</div>
        </div>

        <form id="checkout-form">
            <div class="form-section">
                <h3>收货地址</h3>
                <div class="form-group">
                    <label for="receiver-name">收货人姓名:</label>
                    <input type="text" id="receiver-name" required>
                </div>
                <div class="form-group">
                    <label for="address">详细地址:</label>
                    <input type="text" id="address" required>
                </div>
                <div class="form-group">
                    <label for="phone">联系电话:</label>
                    <input type="tel" id="phone" required>
                </div>
            </div>

            <div class="form-section">
                <h3>支付方式</h3>
                <div class="payment-methods">
                    <label class="radio-group">
                        <input type="radio" name="payment" value="alipay" checked>
                        <span>支付宝</span>
                    </label>
                    <label class="radio-group">
                        <input type="radio" name="payment" value="wechat">
                        <span>微信支付</span>
                    </label>
                    <label class="radio-group">
                        <input type="radio" name="payment" value="bankcard">
                        <span>银行卡</span>
                    </label>
                </div>
            </div>

            <div class="order-summary">
                <h3>订单摘要</h3>
                <div id="order-items">
                    <!-- 订单商品将通过JavaScript动态加载 -->
                </div>
                <div class="total-price">总计: ¥<span id="order-total">0.00</span></div>
            </div>

            <button type="submit" class="btn btn-primary">提交订单</button>
        </form>
    </main>

    <script src="js/main.js"></script>
</body>
</html>
