<!DOCTYPE html>
<html lang="en">
<head>
    <!-- 页面元信息 -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Product Form</title>
    <!-- 引入CSS样式文件 -->
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <!-- 主容器 -->
    <div class="container">
        <!-- 顶部导航栏 -->
        <nav class="navbar">
            <!-- 左侧Logo区域 -->
            <div class="logo">ShopCart</div>
            <!-- 右侧菜单区域 -->
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="cart.html">Cart</a>
                <a href="login.html">Login</a>
                <a href="register.html">Register</a>
            </div>
        </nav>
        
        <!-- 新产品表单主要内容区域 -->
        <main class="form-container">
            <!-- 表单标题 -->
            <h2>Add New Product</h2>
            
            <!-- 产品添加表单 -->
            <form id="product-form">
                <!-- 产品名称输入框 -->
                <div class="form-group">
                    <label for="product-name">Product Name:</label>
                    <input type="text" id="product-name" name="productName" required>
                </div>
                
                <!-- 产品描述输入框 -->
                <div class="form-group">
                    <label for="product-description">Description:</label>
                    <textarea id="product-description" name="productDescription" rows="4" required></textarea>
                </div>
                
                <!-- 产品价格输入框 -->
                <div class="form-group">
                    <label for="product-price">Price:</label>
                    <input type="number" id="product-price" name="productPrice" step="0.01" min="0" required>
                </div>
                
                <!-- 产品图片URL输入框 -->
                <div class="form-group">
                    <label for="product-image">Image URL:</label>
                    <input type="url" id="product-image" name="productImage" placeholder="https://example.com/image.jpg">
                </div>
                
                <!-- 提交按钮 -->
                <button type="submit" class="submit-btn">Add Product</button>
            </form>
        </main>
    </div>
    
    <!-- 引入JavaScript文件 -->
    <script src="main.js"></script>
    <script>
        // 表单提交事件监听器
        document.getElementById('product-form').addEventListener('submit', function(e) {
            e.preventDefault(); // 阻止默认提交行为
            
            // 获取输入值
            const name = document.getElementById('product-name').value;
            const description = document.getElementById('product-description').value;
            const price = parseFloat(document.getElementById('product-price').value);
            const image = document.getElementById('product-image').value || 'https://via.placeholder.com/200';
            
            // 生成唯一ID
            const id = Date.now();
            
            // 获取现有产品列表
            const products = JSON.parse(localStorage.getItem('products')) || [];
            
            // 创建新产品对象
            const newProduct = { id, name, description, price, image };
            products.push(newProduct); // 添加新产品到列表
            
            // 保存更新后的产品列表
            localStorage.setItem('products', JSON.stringify(products));
            
            alert('Product added successfully!');
            // 重置表单
            document.getElementById('product-form').reset();
        });
    </script>
</body>
</html>
